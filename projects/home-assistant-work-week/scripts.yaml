alias: Add Samantha Shift
mode: single
sequence:
  - action: calendar.create_event
    target:
      entity_id: calendar.samantha_work
    data:
      summary: "Samantha Work - {{ states('input_select.samantha_shift_location') }}"
      description: >
        Added from the Home Assistant Work Week tab.
        {% set notes = states('input_text.samantha_shift_notes') %}
        {% if notes not in ['unknown', 'unavailable', '', ' '] %}
        Notes: {{ notes }}
        {% endif %}
      start_date_time: "{{ states('input_datetime.samantha_shift_start') }}"
      end_date_time: "{{ states('input_datetime.samantha_shift_end') }}"

  - delay:
      seconds: 2

  - action: input_button.press
    target:
      entity_id: input_button.work_week_refresh
